<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Radar de Sostenibilidad Calidalia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #1a1a1a;
    }
.logo-radar {
  height: 38px;
  margin-bottom: 12px;
  opacity: 0.95;
}
    header {
      background: #093254;
      color: white;
      padding: 50px 20px 40px;
      text-align: center;
    }
.card.disabled {
  opacity: 0.6;
  background: #f1f3f5;
}

.card.disabled h2 {
  color: #6c757d;
}
    header h1 {
      margin: 0;
      font-size: 30px;
    }
.card.featured {
  border-left: 5px solid #093254;
}
    header p {
      margin-top: 12px;
      opacity: 0.95;
    }

    .container {
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      border-left: 4px solid #093254;
    }

    .card h2 {
      margin: 0 0 10px 0;
      color: #093254;
    }

    .card p {
      margin: 0;
      line-height: 1.6;
      color: #444;
    }

    .back {
      text-align: center;
      margin-top: 25px;
    }

    .back a {
      color: #093254;
      text-decoration: none;
      font-weight: 700;
    }

    .back a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header class="header">

  <img src="logo_calidalia.png"
       alt="Calidalia"
       class="logo-radar">

  <h1>Radar de Sostenibilidad Calidalia</h1>
  <p>Archivo de ediciones ESG</p>

</header>

<div class="container">

  <a class="card" href="numero-1/">
    <h2>Radar Sostenible Nº 1</h2>
    <p>
      Regulación, descarbonización, buenas prácticas, cifras clave y proyectos del sector alimentario.
    </p>
  </a>
  <div class="card disabled">

  <h2>Radar Sostenible Nº 2</h2>
  <p>Próximamente disponible</p>

</div>

  <div class="back">
    <a href="../">← Volver a Sostenibilidad Calidalia</a>
  </div>

</div>

</body>
</html>
