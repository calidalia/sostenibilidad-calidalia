<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda Sostenibilidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #1a1a1a;
    }

    header {
      background: #093254;
      color: white;
      padding: 30px 20px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      margin: 0;
    }

    h2 {
      color: #093254;
      margin-top: 0;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .evento {
      padding: 16px 0;
      border-bottom: 1px solid #e5e5e5;
    }

    .evento:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .fecha {
      font-weight: 700;
      color: #093254;
      margin-bottom: 6px;
    }

    .lugar {
      color: #6c757d;
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<header style="text-align:center;">
  <h1>Agenda Sostenibilidad</h1>
  <p>Hitos y eventos relevantes del mes</p>
</header>

<div style="max-width:900px; margin:20px auto 10px; font-size:14px; line-height:1.6;">
  <a href="index.html" style="color:#093254; font-weight:600; text-decoration:none;">
    ← Volver al Radar Nº 1
  </a>
  <br>
  <a href="../" style="color:#6c757d; text-decoration:none;">
    ↑ Volver al Radar general
  </a>
</div>

<hr style="max-width:900px; margin:15px auto 25px; border:none; border-top:1px solid #e5e5e5;">

<div class="container">

  <div class="card">
    <h2>Agenda Sostenibilidad – Abril</h2>

    <div class="evento">
      <div class="fecha">21 de abril</div>
      <div>Reunión Calidalia</div>
    </div>

    <div class="evento">
      <div class="fecha">20–22 de abril</div>
      <div>XXII Congreso Internacional sobre Sostenibilidad 2026</div>
      <div class="lugar">Rodas (Grecia)</div>
    </div>

    <div class="evento">
      <div class="fecha">22 de abril</div>
      <div>Día Internacional de la Tierra</div>
    </div>

  </div>

</div>

</body>
</html>
